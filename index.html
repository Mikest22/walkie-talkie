<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Walkie-Talkie Online</title>

<style>
*{
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:#04111f;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
}

.card{
  width:100%;
  max-width:420px;
  height:95vh;
  background:#12345a;
  border-radius:25px;
  padding:20px;
  color:white;
  overflow:auto;
  box-shadow:0 0 25px rgba(0,0,0,.45);
}

h1{
  text-align:center;
  margin:0 0 15px 0;
  font-size:32px;
}

.label{
  text-align:center;
  font-size:18px;
  margin-top:8px;
}

input{
  width:100%;
  border:none;
  outline:none;
  border-radius:18px;
  padding:16px;
  font-size:18px;
  text-align:center;
  margin-top:10px;
}

button{
  border:none;
  cursor:pointer;
  color:white;
  font-weight:bold;
}

.actionBtn{
  display:block;
  margin:15px auto;
  width:220px;
  height:65px;
  border-radius:18px;
  font-size:18px;
}

.copyBtn{
  background:#95a5a6;
}

.connectBtn{
  background:#2ecc71;
}

hr{
  border:1px solid rgba(255,255,255,.4);
  margin:18px 0;
}

#talkBtn{
  width:250px;
  height:250px;
  border-radius:50%;
  display:block;
  margin:20px auto;
  background:#ef3340;
  font-size:42px;
  box-shadow:0 12px 0 #8d1520;
}

#talkBtn:active{
  transform:translateY(8px);
  box-shadow:0 3px 0 #8d1520;
}

#status{
  text-align:center;
  color:#ffd166;
  font-size:22px;
  margin-top:15px;
}

#info{
  text-align:center;
  color:#dfe6e9;
  font-size:17px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<h1>📻 Walkie-Talkie</h1>

<div class="label">Tu ID:</div>

<input id="myId" readonly value="Generando ID...">

<button class="actionBtn copyBtn" onclick="copyMyId()">
COPIAR MI ID
</button>

<hr>

<div class="label">ID del otro celular:</div>

<input id="remoteId" placeholder="Pega aquí el ID del otro">

<button class="actionBtn connectBtn" onclick="connectPeer()">
CONECTAR
</button>

<hr>

<button id="talkBtn">
HABLAR
</button>

<div id="status">
Generando conexión...
</div>

<div id="info">
Mantén presionado HABLAR y suelta para dejar de transmitir.
</div>

</div>

<audio id="remoteAudio" autoplay playsinline></audio>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js"></script>

<script>

let peer;
let conn;
let mediaCall;
let localStream;
let remotePeerId="";

const myId=document.getElementById("myId");
const remoteId=document.getElementById("remoteId");
const talkBtn=document.getElementById("talkBtn");
const statusDiv=document.getElementById("status");
const remoteAudio=document.getElementById("remoteAudio");

function setStatus(txt){
 statusDiv.innerText=txt;
}

async function initMic(){

 if(localStream) return;

 localStream=await navigator.mediaDevices.getUserMedia({
   audio:{
    echoCancellation:true,
    noiseSuppression:true,
    autoGainControl:true
   }
 });

 // inicia silenciado
 localStream.getAudioTracks()[0].enabled=false;

}

peer=new Peer();

peer.on("open",(id)=>{
 myId.value=id;
 setStatus("Listo.");
});

peer.on("call",(call)=>{

 call.answer(localStream);

 call.on("stream",(remoteStream)=>{

   remoteAudio.srcObject=remoteStream;

   remoteAudio.play().catch(()=>{});

   setStatus("Conectado.");

 });

});

peer.on("error",(err)=>{

 setStatus("Error: "+err.type);

});

async function connectPeer(){

 try{

   remotePeerId=remoteId.value.trim();

   if(!remotePeerId){
    setStatus("Pega el ID.");
    return;
   }

   await initMic();

   conn=peer.connect(remotePeerId);

   conn.on("open",()=>{

      mediaCall=
      peer.call(
       remotePeerId,
       localStream
      );

      setStatus("Conectado.");

   });

 }catch(e){

   setStatus("Error de micrófono.");

 }

}

function startTalking(){

 if(!localStream) return;

 localStream
 .getAudioTracks()[0]
 .enabled=true;

 setStatus("Transmitiendo...");

}

function stopTalking(){

 if(!localStream) return;

 localStream
 .getAudioTracks()[0]
 .enabled=false;

 setStatus("Conectado.");

}

async function copyMyId(){

 await navigator.clipboard.writeText(
  myId.value
 );

 setStatus("ID copiado.");

}

talkBtn.addEventListener(
 "touchstart",
 (e)=>{
  e.preventDefault();
  startTalking();
 });

talkBtn.addEventListener(
 "touchend",
 (e)=>{
  e.preventDefault();
  stopTalking();
 });

</script>
